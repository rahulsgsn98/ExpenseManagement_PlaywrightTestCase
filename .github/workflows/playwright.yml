name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: Microsoft Edge
            project_slug: microsoft-edge
            shard: 1/6
            shard_name: 1-of-6
          - project: Microsoft Edge
            project_slug: microsoft-edge
            shard: 2/6
            shard_name: 2-of-6
          - project: Microsoft Edge
            project_slug: microsoft-edge
            shard: 3/6
            shard_name: 3-of-6
          - project: Microsoft Edge
            project_slug: microsoft-edge
            shard: 4/6
            shard_name: 4-of-6
          - project: Microsoft Edge
            project_slug: microsoft-edge
            shard: 5/6
            shard_name: 5-of-6
          - project: Microsoft Edge
            project_slug: microsoft-edge
            shard: 6/6
            shard_name: 6-of-6

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install CI browsers
        run: npx playwright install msedge

      - name: Run Playwright tests
        run: npx playwright test --workers=1 --reporter=line,blob --project="${{ matrix.project }}" --shard=${{ matrix.shard }}

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.project_slug }}-${{ matrix.shard_name }}
          path: blob-report
          retention-days: 1

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.project_slug }}-${{ matrix.shard_name }}
          path: allure-results
          retention-days: 7

  merge-reports:
    if: always()
    needs: test
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          merge-multiple: true
          path: blob-report

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results

      - name: Merge Playwright Reports
        run: npx playwright merge-reports --reporter html ./blob-report

      - name: Upload Final HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      - name: Upload Allure Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 30
